name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-14   # Apple Silicon
            os: darwin
            goarch: arm64
          - runner: macos-13   # Intel
            os: darwin
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X github.com/ivanhoe/apus-cli/cmd.version=${GITHUB_REF_NAME}" \
            -o apus .

      - name: Create tarball
        run: |
          TARBALL="apus_${GITHUB_REF_NAME}_${{ matrix.os }}_${{ matrix.goarch }}.tar.gz"
          tar -czf "${TARBALL}" apus
          echo "TARBALL=${TARBALL}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apus_${{ matrix.os }}_${{ matrix.goarch }}
          path: ${{ env.TARBALL }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
          draft: false
