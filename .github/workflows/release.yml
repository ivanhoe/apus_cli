name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-14   # Apple Silicon
            os: darwin
            goarch: arm64
          - runner: macos-13   # Intel
            os: darwin
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X github.com/ivanhoe/apus_cli/cmd.version=${GITHUB_REF_NAME}" \
            -o apus .

      - name: Create tarball
        run: |
          TARBALL="apus_${GITHUB_REF_NAME}_${{ matrix.os }}_${{ matrix.goarch }}.tar.gz"
          tar -czf "${TARBALL}" apus
          echo "TARBALL=${TARBALL}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apus_${{ matrix.os }}_${{ matrix.goarch }}
          path: ${{ env.TARBALL }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
          draft: false

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        run: |
          ARM64_SHA=$(sha256sum dist/apus_${GITHUB_REF_NAME}_darwin_arm64.tar.gz | awk '{print $1}')
          AMD64_SHA=$(sha256sum dist/apus_${GITHUB_REF_NAME}_darwin_amd64.tar.gz | awk '{print $1}')
          echo "arm64=${ARM64_SHA}" >> $GITHUB_OUTPUT
          echo "amd64=${AMD64_SHA}" >> $GITHUB_OUTPUT

      - name: Generate formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -e "s/VERSION/${VERSION}/g" \
              -e "s/SHA256_ARM64/${{ steps.sha.outputs.arm64 }}/g" \
              -e "s/SHA256_AMD64/${{ steps.sha.outputs.amd64 }}/g" \
              scripts/homebrew-formula.rb > apus.rb
          cat apus.rb

      - name: Push to homebrew-tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: apus.rb
          destination_repo: ivanhoe/homebrew-tap
          destination_folder: Formula
          user_email: github-actions[bot]@users.noreply.github.com
          user_name: github-actions[bot]
          commit_message: "apus ${{ github.ref_name }}"
