name: FixtureSwiftUISingleTarget
options:
  bundleIdPrefix: dev.fixture
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  FixtureSwiftUISingleTarget:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.fixture.fixtureswiftuisingletarget
        SWIFT_VERSION: 5.9
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
